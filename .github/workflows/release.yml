name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump to apply before building"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      target_ref:
        description: "Branch or ref to release from"
        required: true
        default: release
        type: string

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump selected version
        run: bash scripts/bump-version.sh "${{ inputs.bump_type }}"

      - name: Read release version
        id: version
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        env:
          BRANCH_NAME: ${{ inputs.target_ref }}
        run: |
          git push origin HEAD:"$BRANCH_NAME"
          git push origin "refs/tags/${{ steps.version.outputs.tag_name }}"

  release:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            rust_target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            rust_target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            rust_target: "x86_64-pc-windows-msvc"
            args: "--target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare-release.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VIBEDB_DEFAULT_AI_URL: ${{ vars.VIBEDB_DEFAULT_AI_URL != '' && vars.VIBEDB_DEFAULT_AI_URL || 'https://gen.pollinations.ai' }}
          VIBEDB_DEFAULT_AI_MODEL: ${{ vars.VIBEDB_DEFAULT_AI_MODEL != '' && vars.VIBEDB_DEFAULT_AI_MODEL || 'qwen-coder' }}
          VIBEDB_DEFAULT_AI_API_KEY: ${{ secrets.VIBEDB_DEFAULT_AI_API_KEY }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: "VibeDB ${{ needs.prepare-release.outputs.tag_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-updater:
    needs: [prepare-release, release]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.prepare-release.outputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Download release assets
        run: |
          mkdir -p artifacts
          gh release download ${{ needs.prepare-release.outputs.tag_name }} --dir artifacts --pattern "*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        run: node scripts/generate-latest-json.mjs artifacts

      - name: Upload latest.json
        run: gh release upload ${{ needs.prepare-release.outputs.tag_name }} latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  refresh-release-notes:
    needs: [prepare-release, release]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare-release.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Generate release body
        env:
          POLLINATIONS_BASE_URL: ${{ vars.VIBEDB_RELEASE_NOTES_AI_URL != '' && vars.VIBEDB_RELEASE_NOTES_AI_URL || vars.VIBEDB_DEFAULT_AI_URL != '' && vars.VIBEDB_DEFAULT_AI_URL || 'https://gen.pollinations.ai' }}
          POLLINATIONS_MODEL: ${{ vars.VIBEDB_RELEASE_NOTES_AI_MODEL != '' && vars.VIBEDB_RELEASE_NOTES_AI_MODEL || vars.VIBEDB_DEFAULT_AI_MODEL != '' && vars.VIBEDB_DEFAULT_AI_MODEL || 'openai' }}
          POLLINATIONS_API_KEY: ${{ secrets.VIBEDB_RELEASE_NOTES_AI_API_KEY != '' && secrets.VIBEDB_RELEASE_NOTES_AI_API_KEY || secrets.VIBEDB_DEFAULT_AI_API_KEY }}
        run: |
          set -euo pipefail

          TAG="${{ needs.prepare-release.outputs.tag_name }}"
          BODY_FILE="release_body.md"

          bun scripts/generate-release-notes.mjs "$TAG" > "$BODY_FILE"

          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")"
          if [ -n "$PREVIOUS_TAG" ]; then
            {
              echo ""
              echo "---"
              echo "## Changelog"
              echo "**Full Changelog**: [${PREVIOUS_TAG}...${TAG}](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG})"
              echo ""
              git log "${PREVIOUS_TAG}..${TAG}" --pretty=format:"- \`%h\` %s @%an"
              echo ""
            } >> "$BODY_FILE"
          fi

          cat << 'EOF' >> "$BODY_FILE"

          ---
          ### ⚠️ macOS "App is damaged" fix
          This app is not code-signed. After installing, if macOS says "App is damaged", run this in Terminal:
          ```bash
          xattr -cr "/Applications/Vibe DB.app"
          ```
          Then open the app again.
          EOF

      - name: Update GitHub release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare-release.outputs.tag_name }}"
          gh release edit "$TAG" --title "VibeDB ${TAG}" --notes-file release_body.md

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VIBEDB_DEFAULT_AI_URL: ${{ vars.VIBEDB_DEFAULT_AI_URL != '' && vars.VIBEDB_DEFAULT_AI_URL || 'https://gen.pollinations.ai' }}
          VIBEDB_DEFAULT_AI_MODEL: ${{ vars.VIBEDB_DEFAULT_AI_MODEL != '' && vars.VIBEDB_DEFAULT_AI_MODEL || 'qwen-coder' }}
          VIBEDB_DEFAULT_AI_API_KEY: ${{ secrets.VIBEDB_DEFAULT_AI_API_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VibeDB ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-updater:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download release assets
        run: |
          mkdir -p artifacts
          gh release download ${{ github.ref_name }} --dir artifacts --pattern "*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        run: node scripts/generate-latest-json.mjs artifacts

      - name: Upload latest.json
        run: gh release upload ${{ github.ref_name }} latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  refresh-release-notes:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Generate release body
        env:
          POLLINATIONS_BASE_URL: ${{ vars.VIBEDB_RELEASE_NOTES_AI_URL != '' && vars.VIBEDB_RELEASE_NOTES_AI_URL || vars.VIBEDB_DEFAULT_AI_URL != '' && vars.VIBEDB_DEFAULT_AI_URL || 'https://gen.pollinations.ai' }}
          POLLINATIONS_MODEL: ${{ vars.VIBEDB_RELEASE_NOTES_AI_MODEL != '' && vars.VIBEDB_RELEASE_NOTES_AI_MODEL || vars.VIBEDB_DEFAULT_AI_MODEL != '' && vars.VIBEDB_DEFAULT_AI_MODEL || 'openai' }}
          POLLINATIONS_API_KEY: ${{ secrets.VIBEDB_RELEASE_NOTES_AI_API_KEY != '' && secrets.VIBEDB_RELEASE_NOTES_AI_API_KEY || secrets.VIBEDB_DEFAULT_AI_API_KEY }}
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          BODY_FILE="release_body.md"

          bun scripts/generate-release-notes.mjs "$TAG" > "$BODY_FILE"

          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")"
          if [ -n "$PREVIOUS_TAG" ]; then
            {
              echo ""
              echo "---"
              echo "## Changelog"
              echo "**Full Changelog**: [${PREVIOUS_TAG}...${TAG}](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG})"
              echo ""
              git log "${PREVIOUS_TAG}..${TAG}" --pretty=format:"- \`%h\` %s @%an"
              echo ""
            } >> "$BODY_FILE"
          fi

          cat << 'EOF' >> "$BODY_FILE"

          ---
          ### ⚠️ macOS "App is damaged" fix
          This app is not code-signed. After installing, if macOS says "App is damaged", run this in Terminal:
          ```bash
          xattr -cr "/Applications/Vibe DB.app"
          ```
          Then open the app again.
          EOF

      - name: Update GitHub release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          gh release edit "$TAG" --title "VibeDB ${TAG}" --notes-file release_body.md
